name: Python Workflow

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python Program
        run: python3 app.py

      - name: Install pytest
        run: pip install pytest

      - name: Run Tests
        run: pytest